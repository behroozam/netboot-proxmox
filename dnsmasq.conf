# Disable the DNS server portion if you don't need it
port=0

# Log queries for debugging (very helpful for first-time setup)
log-dhcp

# Identify the architecture of the booting client
dhcp-vendorclass=BIOS,PXEClient:Arch:00000
dhcp-vendorclass=UEFI32,PXEClient:Arch:00006
dhcp-vendorclass=UEFI,PXEClient:Arch:00007
dhcp-vendorclass=UEFI64,PXEClient:Arch:00009

# Set the ProxyDHCP range. 
# Use your network's subnet, but the 'proxy' keyword is what matters.
dhcp-range=192.168.1.0,proxy

# Provide the boot file based on the client's architecture
# Replace <SERVER_IP> with the actual IP of your Docker host
dhcp-boot=net:BIOS,netboot.xyz.kpxe,,192.168.1.102
dhcp-boot=net:UEFI,netboot.xyz.efi,,192.168.1.102
dhcp-boot=net:UEFI64,netboot.xyz.efi,,192.168.1.102
dhcp-boot=net:UEFI32,netboot.xyz.efi,,192.168.1.102

# Required for some UEFI firmwares to recognize the ProxyDHCP
pxe-service=X86PC, "Boot BIOS", netboot.xyz.kpxe
pxe-service=X86-64_EFI, "Boot UEFI", netboot.xyz.efi
