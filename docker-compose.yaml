services:
  dnsmasq:
    image: dockurr/dnsmasq
    container_name: dnsmasq-proxy
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - ./dnsmasq.conf:/etc/dnsmasq.conf:ro

  netbootxyz:
    image: ghcr.io/netbootxyz/netbootxyz
    container_name: netbootxyz
    restart: unless-stopped
    environment:
      - MENU_VERSION=2.0.84
      - NGINX_PORT=80
      - WEB_APP_PORT=3000
    ports:
      - "3000:3000"    # Web UI
      - "69:69/udp"    # TFTP
      - "4000:80"      # Assets / Nginx
    volumes:
      - ./config:/config
      - ./assets:/assets
